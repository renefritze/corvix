---
github:
  token_env: GITHUB_TOKEN
  api_base_url: https://api.github.com

polling:
  interval_seconds: 60
  per_page: 50
  max_pages: 5
  all: false
  participating: false

state:
  cache_file: /data/notifications.json

enrichment:
  enabled: true
  max_requests_per_cycle: 25
  github_latest_comment:
    enabled: true
    timeout_seconds: 10
  github_pr_state:
    enabled: true
    timeout_seconds: 10

scoring:
  unread_bonus: 15
  age_decay_per_hour: 0.25
  reason_weights:
    mention: 50
    review_requested: 40
    assign: 30
    author: 10
  repository_weights: {}
  subject_type_weights:
    PullRequest: 8
    Issue: 5
  title_keyword_weights:
    urgent: 25
    security: 30

rules:
  global:
  - name: mute-bot-noise
    match:
      title_regex: ".*\\[bot\\].*"
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  - name: mute-oasys-release-tags
    match:
      repository_glob: ["arup-group/oasys*"]
      title_regex: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  - name: mute-dependabot-prs
    match:
      subject_type_in: ["PullRequest"]
      context:
      - path: github.pr_state.author.login
        op: equals
        value: dependabot[bot]
        case_insensitive: true
      - path: github.pr_state.state
        op: equals
        value: closed
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  - name: mute-codecov-comments
    match:
      reason_in: ["comment"]
      context:
      - path: github.latest_comment.author.login
        op: equals
        value: codecov[bot]
        case_insensitive: true
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  - name: mute-test-report-link-comments
    match:
      reason_in: ["comment"]
      context:
      - path: github.latest_comment.is_test_report_link_only
        op: equals
        value: true
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  - name: mute-ci-only-comments
    match:
      reason_in: ["comment"]
      context:
      - path: github.latest_comment.is_ci_only
        op: equals
        value: true
    actions:
    - type: mark_read
    exclude_from_dashboards: true
  per_repository: {}

notifications:
  enabled: true
  detect:
    include_read: false
    min_score: 0
  browser_tab:
    enabled: true
    max_per_cycle: 5
    cooldown_seconds: 10
  web_push:
    enabled: false
    vapid_public_key_env: CORVIX_VAPID_PUBLIC_KEY
    vapid_private_key_env: CORVIX_VAPID_PRIVATE_KEY
    subject: "mailto:ops@example.com"

dashboards:
- name: triage
  group_by: repository
  sort_by: score
  descending: true
  include_read: false
  max_items: 120
  match:
    reason_in: ["mention", "review_requested", "assign"]
- name: overview
  group_by: reason
  sort_by: updated_at
  descending: true
  include_read: true
  max_items: 300
