---
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corvix
      POSTGRES_USER: corvix
      POSTGRES_PASSWORD: corvix
    volumes:
    - corvix_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corvix -d corvix"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    command:
    - uv
    - run
    - uvicorn
    - corvix.web.app:app
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    - --reload
    - --reload-dir
    - /app/src
    environment:
      CORVIX_CONFIG: /app/config/corvix.yaml
      DATABASE_URL: postgresql://corvix:corvix@db:5432/corvix
    ports:
    - "8000:8000"
    volumes:
    - ./src:/app/src
    - ./config:/app/config
    - corvix_state:/data
    depends_on:
      db:
        condition: service_healthy

  poller:
    build:
      context: .
    command:
    - uv
    - run
    - corvix
    - --config
    - /app/config/corvix.yaml
    - watch
    - --dry-run
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      CORVIX_CONFIG: /app/config/corvix.yaml
      DATABASE_URL: postgresql://corvix:corvix@db:5432/corvix
    volumes:
    - ./src:/app/src
    - ./config:/app/config
    - corvix_state:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  corvix_db:
  corvix_state:
