---
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: corvix
      POSTGRES_USER: corvix
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
    - postgres_password
    volumes:
    - corvix_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corvix -d corvix"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: unless-stopped
    command:
    - uvicorn
    - corvix.web.app:app
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    environment:
      CORVIX_CONFIG: /app/config/corvix.yaml
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
    - database_url

    # Load environment variables from a `.env` file (multiple named tokens allowed)
    env_file: .env
    ports:
    - "8000:8000"
    volumes:
    - ./config:/app/config
    - corvix_state:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - from urllib.request import urlopen; import json, sys; r = urlopen("http://127.0.0.1:8000/api/health", timeout=2);
        sys.exit(0 if r.status == 200 and json.loads(r.read()).get("status") == "ok" else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  poller:
    build:
      context: .
    restart: unless-stopped
    command:
    - corvix
    - --config
    - /app/config/corvix.yaml
    - watch
    - --dry-run
    environment:
      CORVIX_CONFIG: /app/config/corvix.yaml
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
    - database_url

    # Load environment variables from a `.env` file (multiple named tokens allowed)
    env_file: .env
    volumes:
    - ./config:/app/config
    - corvix_state:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - from pathlib import Path; import time, sys; p = Path("/data/notifications.json"); sys.exit(0 if p.exists() and time.time()
        - p.stat().st_mtime < 300 else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 75s

volumes:
  corvix_db:
  corvix_state:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  database_url:
    file: ./secrets/database_url.txt
