---
services:
  web-lighthouse:
    build:
      context: .
    # Migrate + seed inline rather than depending on the one-shot `migrate`
    # service: the lighthouse job runs `up --abort-on-container-exit`, which
    # would tear everything down the moment that one-shot container exits.
    entrypoint:
    - sh
    - -c
    - alembic upgrade head && python /fixtures/prepare_fixture.py && exec uvicorn corvix.web.app:app --host 0.0.0.0 --port
      8000
    environment:
      CORVIX_CONFIG: /fixtures/corvix.lighthouse.yaml
      LH_TEMPLATE: /fixtures/notifications.json
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
    - database_url
    depends_on:
      db:
        condition: service_healthy
    ports: ["4173:8000"]
    volumes:
    - ./tests/lighthouse:/fixtures:ro
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - from urllib.request import urlopen; import sys; sys.exit(0 if urlopen("http://127.0.0.1:8000/api/health", timeout=2).status
        == 200 else 1)
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  lighthouse:
    build:
      context: .
      dockerfile: docker/lighthouse.Dockerfile
    depends_on:
      web-lighthouse:
        condition: service_healthy
    working_dir: /workspace
    command:
    - lhci
    - autorun
    - --config=.lighthouserc.json
    environment:
      CHROME_PATH: /usr/bin/chromium
    healthcheck:
      test: ["CMD-SHELL", "command -v lhci >/dev/null && command -v chromium >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
    - ./:/workspace

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt.example
  github_token:
    file: ./secrets/github_token.txt.example
  database_url:
    file: ./secrets/database_url.txt.example
