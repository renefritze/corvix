---
on:
  push:
    branches:
    - main
  merge_group:
  pull_request:
    branches:
    - main
  workflow_dispatch:
  schedule:
  - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

name: pytest
jobs:
  docker-compose-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - name: Verify docker compose build
      run: |
        docker compose build

  fast-tests:
    needs: docker-compose-build
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        python-version: ['3.13', '> 3.13']
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b  # v7.2.0
      name: Setup UV + Python
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock

    - name: Install dependencies
      run: |
        uv sync

    - name: Build frontend assets
      run: |
        make frontend-build

    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code

    - name: Lint with ruff
      run: |
        uv run --frozen ruff check .

    - name: Type check with ty
      run: |
        uv run --frozen ty check src/corvix/

    - name: Test fast suite
      run: |
        uv run --frozen pytest -m "not integration and not e2e"

      # - name: Upload coverage
      #   uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
      #   with:
      #     env_vars: OS,PYTHON_VERSION
      #     fail_ci_if_error: true
      #     token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    needs: docker-compose-build
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        python-version: ['3.13', '> 3.13']
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b  # v7.2.0
      name: Setup UV + Python
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install dependencies
      run: |
        uv sync
    - name: Build frontend assets
      run: |
        make frontend-build
    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code
    - name: Test integration suite
      run: |
        uv run --frozen pytest -m "integration"

  e2e-tests:
    if: github.event_name == 'merge_group' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b  # v7.2.0
      name: Setup UV + Python
      with:
        python-version: '3.13'
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install dependencies (including e2e extras)
      run: |
        uv sync --extra e2e
    - name: Build frontend assets
      run: |
        make frontend-build
    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code
    - name: Install Playwright browser
      run: |
        uv run playwright install --with-deps chromium
    - name: Test e2e suite
      run: |-
        uv run --frozen pytest -m "e2e"
