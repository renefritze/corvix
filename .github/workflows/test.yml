---
on:
  push:
    branches:
    - main
  merge_group:
  pull_request:
    branches:
    - main
  workflow_dispatch:
  schedule:
  - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

name: pytest
jobs:
  docker-compose-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Verify docker compose build
      run: |
        docker compose build

  fast-tests:
    needs: docker-compose-build
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        python-version: ['3.13', '> 3.13']
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      name: Setup UV + Python
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock

    - name: Install dependencies
      run: |
        uv sync

    - name: Build frontend assets
      run: |
        make frontend-build

    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code

    - name: Test frontend unit suite with coverage gate
      run: |
        npm --prefix frontend run test:coverage

    - name: Lint with ruff
      run: |
        uv run --frozen ruff check .

    - name: Type check with ty
      run: |
        uv run --frozen ty check src/corvix/

    - name: Test fast suite
      run: |
        uv run --frozen pytest -m "not integration and not e2e" --cov-report=xml:coverage-python.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
      with:
        use_oidc: true
        fail_ci_if_error: true
        files: |
          coverage-python.xml
          frontend/coverage/lcov.info
        flags: suite-fast-tests,lang-python,lang-frontend,${{ matrix.python-version == '3.13' && 'py313' || 'pygt313' }}
        name: fast-tests-${{ matrix.python-version }}

  integration-tests:
    needs: docker-compose-build
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        python-version: ['3.13', '> 3.13']
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      name: Setup UV + Python
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install dependencies
      run: |
        uv sync
    - name: Build frontend assets
      run: |
        make frontend-build
    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code

    - name: Test frontend unit suite with coverage gate
      run: |
        npm --prefix frontend run test:coverage

    - name: Test integration suite
      run: |
        uv run --frozen pytest -m "integration" --cov-report=xml:coverage-python.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
      with:
        use_oidc: true
        fail_ci_if_error: true
        files: |
          coverage-python.xml
          frontend/coverage/lcov.info
        flags: suite-integration-tests,lang-python,lang-frontend,${{ matrix.python-version == '3.13' && 'py313' || 'pygt313'
          }}
        name: integration-tests-${{ matrix.python-version }}

  e2e-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'schedule' || github.event_name
      == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      name: Setup UV + Python
      with:
        python-version: '3.13'
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install dependencies (including e2e extras)
      run: |
        uv sync --extra e2e
    - name: Build frontend assets
      run: |
        make frontend-build
    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code

    - name: Test frontend unit suite with coverage gate
      run: |
        npm --prefix frontend run test:coverage

    - name: Install Playwright browser
      run: |
        uv run playwright install --with-deps chromium
    - name: Test e2e suite
      run: |-
        uv run --frozen pytest -m "e2e" --cov-report=xml:coverage-python.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
      with:
        use_oidc: true
        fail_ci_if_error: true
        files: |
          coverage-python.xml
          frontend/coverage/lcov.info
        flags: suite-e2e-tests,lang-python,lang-frontend,py313
        name: e2e-tests-py313

  lighthouse-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'schedule' || github.event_name
      == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Run Lighthouse checks with Docker Compose override
      run: |
        docker compose -f docker-compose.yml -f docker-compose.lighthouse.yml up --build --abort-on-container-exit --exit-code-from lighthouse lighthouse
    - name: Upload Lighthouse report artifacts
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: lighthouse-reports
        path: .lighthouseci/
        if-no-files-found: ignore

  ui-screenshot-check:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'schedule' || github.event_name
      == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      name: Setup UV + Python
      with:
        python-version: '3.13'
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install Playwright browser dependencies
      run: |
        uv sync --extra e2e
        uv run playwright install --with-deps chromium
    - name: Regenerate UI screenshot
      run: |
        make ui-screenshot
    - name: Verify screenshot is up to date
      run: |
        git add -N docs/_static/corvix-ui.png
        git diff --exit-code -- docs/_static/corvix-ui.png

  tests-status:
    name: tests-status
    if: ${{ always() }}
    needs:
    - docker-compose-build
    - fast-tests
    - integration-tests
    - e2e-tests
    - lighthouse-tests
    - ui-screenshot-check
    runs-on: ubuntu-24.04
    steps:
    - name: Fail if any required test job failed
      env:
        DOCKER_COMPOSE_BUILD_RESULT: ${{ needs.docker-compose-build.result }}
        FAST_TESTS_RESULT: ${{ needs.fast-tests.result }}
        INTEGRATION_TESTS_RESULT: ${{ needs.integration-tests.result }}
        E2E_TESTS_RESULT: ${{ needs.e2e-tests.result }}
        LIGHTHOUSE_TESTS_RESULT: ${{ needs.lighthouse-tests.result }}
        UI_SCREENSHOT_CHECK_RESULT: ${{ needs.ui-screenshot-check.result }}
      run: |-
        echo "docker-compose-build: ${DOCKER_COMPOSE_BUILD_RESULT}"
        echo "fast-tests: ${FAST_TESTS_RESULT}"
        echo "integration-tests: ${INTEGRATION_TESTS_RESULT}"
        echo "e2e-tests: ${E2E_TESTS_RESULT}"
        echo "lighthouse-tests: ${LIGHTHOUSE_TESTS_RESULT}"
        echo "ui-screenshot-check: ${UI_SCREENSHOT_CHECK_RESULT}"

        for result in \
          "${DOCKER_COMPOSE_BUILD_RESULT}" \
          "${FAST_TESTS_RESULT}" \
          "${INTEGRATION_TESTS_RESULT}" \
          "${E2E_TESTS_RESULT}" \
          "${LIGHTHOUSE_TESTS_RESULT}" \
          "${UI_SCREENSHOT_CHECK_RESULT}"; do
          if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
            echo "Detected failing upstream test job result: ${result}"
            exit 1
          fi
        done
