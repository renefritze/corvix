---
on:
  push:
    branches:
    - main
  merge_group:
  pull_request:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

name: pytest
jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.13', '> 3.13']
        os: [ubuntu-24.04]

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
    - uses: actions/setup-node@8c91899e586424e1437f83e324830e0d4f79ebfb  # v4.0.4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b  # v7.2.0
      name: Setup UV + Python
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock

    - name: Install dependencies
      run: |
        uv sync

    - name: Build frontend assets
      run: |
        make frontend-build

    - name: Ensure generated bundles are untracked
      run: |
        if git ls-files --error-unmatch src/corvix/web/static/assets/app.js; then
          echo "src/corvix/web/static/assets/app.js must not be tracked"
          exit 1
        fi
        if git ls-files --error-unmatch src/corvix/web/static/assets/index.css; then
          echo "src/corvix/web/static/assets/index.css must not be tracked"
          exit 1
        fi
        git diff --exit-code

    - name: Lint with ruff
      run: |
        uv run --frozen ruff check .

    - name: Type check with ty
      run: |
        uv run --frozen ty check src/corvix/

    - name: Test with pytest
      run: |
        uv run --frozen pytest

    - name: Upload coverage
      uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
      with:
        env_vars: OS,PYTHON_VERSION
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
