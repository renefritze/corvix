---
# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Upload Python Package

on:
  push:
    tags:
    - v*

jobs:
  pypi:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: actions/setup-node@8c91899e586424e1437f83e324830e0d4f79ebfb  # v4.0.4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      name: Setup UV + Python
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Build dist artefacts
      run: |
        uv sync
        make frontend-build
        uv run python -m build --sdist --wheel --outdir dist/
    - name: Wheel smoke test
      run: |
        python -m venv /tmp/corvix-wheel-smoke
        /tmp/corvix-wheel-smoke/bin/pip install dist/*.whl
        /tmp/corvix-wheel-smoke/bin/python - <<'PY'
        from importlib.resources import files
        assets = files("corvix.web").joinpath("static/assets")
        assert assets.joinpath("app.js").is_file()
        assert assets.joinpath("index.css").is_file()
        print("Wheel assets OK")
        PY
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
      with:
        user: __token__
        password: ${{ secrets.PYPI_TOKEN }}
  github:
    name: Create Release
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create Release
      id: create_release
      uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e  # v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        body: |
          Changes in this Release
          - First Change
          - Second Change
        draft: true
        prerelease: false
