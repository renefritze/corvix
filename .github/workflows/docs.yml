---
name: Docs

on:
  push:
    branches:
    - main
  pull_request:

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build_docs:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        submodules: recursive
        # we rely on git describe to create our project version, that needs all commits since the most recent tag
        # there's no easy way to only get those -> fetch all
        fetch-depth: 0
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      name: Setup UV + Python
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/pyproject.toml
          **/uv.lock
    - name: Install doc building dependencies
      run: |
        sudo apt-get install -y doxygen ninja-build
    - name: Configure git to allow access to internal repos
      shell: bash -l {0}
      # this mirrors what actions/checkout does to allow cloning internal repos
      run: |
        git config --global http.https://github.com/arup-group/.extraheader "AUTHORIZATION: basic $(printf "x-access-token:%s" "${{secrets.OASYS_REPO_SCOPE_GITHUB_PAT}}" | base64 -w0)"
    - name: Install dependencies docs
      run: |
        uv sync --group docs
    - name: Build docs
      run: |
        make docs-build
    - name: Upload html artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
      with:
        path: docs/_build/html/
  deploy_docs:
    runs-on: ubuntu-24.04
    needs: [build_docs]
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write  # to deploy to Pages
      id-token: write  # to verify the deployment originates from an appropriate source
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
