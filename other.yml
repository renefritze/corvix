---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: e2c2116d86a80e72e7146a06e68b7c228afc6319  # frozen: v0.6.13
  hooks:
  - id: cmake-format
    additional_dependencies: [pyyaml>=5.1]  # see https://github.com/cheshirekow/cmake-format-precommit/pull/4#issuecomment-943444582
    args: [-i, --config-files=.cmake_format.py]
    exclude: config.h.cmake
  - id: cmake-lint
    additional_dependencies: [pyyaml>=5.1]  # see https://github.com/cheshirekow/cmake-format-precommit/pull/4#issuecomment-943444582
    args: [--config-files=.cmake_format.py]
    exclude: config.h.cmake
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: 5ba58aca0bd5bc7c0e1c0fc45af2e88d6a2bde83  # frozen: v0.14.10
  hooks:
  - id: ruff-check
  - id: ruff-format
- repo: https://github.com/biomejs/pre-commit
  rev: 04a2d319df467d8f2cb22d4e4708c33232339894  # frozen: v2.3.10
  hooks:
  - id: biome-check
    additional_dependencies: ['@biomejs/biome@1.8.3']
    types: [javascript]
  - id: biome-format
    additional_dependencies: ['@biomejs/biome@1.8.3']
    types: [javascript]
- repo: https://github.com/Mateusz-Grzelinski/actionlint-py
  rev: 85c37735ea69e5baf0681530e57e63deee0ce733  # frozen: v1.7.10.24
  hooks:
  - id: actionlint
    additional_dependencies: [pyflakes>=3.0.1, shellcheck-py>=0.9.0.5]
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
  hooks:
  - id: shellcheck
- repo: https://github.com/Mateusz-Grzelinski/actionlint-py
  rev: 85c37735ea69e5baf0681530e57e63deee0ce733  # frozen: v1.7.10.24
  hooks:
  - id: actionlint
    additional_dependencies: [pyflakes>=3.0.1, shellcheck-py>=0.9.0.5]
- repo: https://github.com/koalaman/shellcheck-precommit
  rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d  # frozen: v0.11.0
  hooks:
  - id: shellcheck
- repo: https://github.com/editorconfig-checker/editorconfig-checker.python
  rev: 11ea70506fd878d26129b2b87746fd1a1f6b561b  # frozen: 3.6.0
  hooks:
  - id: editorconfig-checker
    alias: ec
    exclude: tests/test_check_file_encoding/invalid_encoding\.yml
- repo: https://github.com/arup-group/oasys-pre-commit-hooks
  rev: 2f539aa17bb3f8d07081baf153836c021a50dbbd  # frozen: 2026.2.0
  hooks:
  - id: pin-github-actions
    args: [--verbose]
    additional_dependencies:
    - pip_system_certs==4.0
- repo: https://github.com/google/yamlfmt
  rev: b5ca1890231d5e1e5181fef75a1be609d1e25029  # frozen: v0.21.0
  hooks:
  - id: yamlfmt
    exclude: .clang-(format|tidy)|.*invalid.*\.yml|test_patterns_in_.*\.yml
# this should go last since it will fix line endings broken by other tools
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: no-commit-to-branch
    args: [--branch, main]
  - id: trailing-whitespace
  - id: check-added-large-files
  - id: check-case-conflict
    exclude: tests/.*
  - id: mixed-line-ending
    args: [--fix=lf]
  - id: end-of-file-fixer
  - id: check-yaml
    exclude: (tests/.*/invalid.yml|tests/test_check_file_encoding/invalid_encoding.yml)
  - id: check-xml
    exclude: tests/data/invalid.xml
  - id: check-json
    exclude: tests/test_cmake_presets/parse_error.json
  - id: check-toml
  - id: pretty-format-json
    args: [--autofix, --no-sort-keys, --indent=4]
    exclude: ^tests/.*json$
  - id: check-symlinks
  - id: debug-statements
  - id: fix-byte-order-marker
