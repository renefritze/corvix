<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=__ASSET_VERSION__" />
    <title>Corvix</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("corvix.theme");
          let theme;
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else {
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            theme = prefersDark ? "dark" : "light";
          }
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/app.js?v=__ASSET_VERSION__"></script>
    <link rel="stylesheet" crossorigin href="/assets/index.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
